<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Parcel Sweep postal truck icon</title>
  <desc id="desc">A custom postal-style delivery truck icon for map markers. Not an official USPS logo.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f4c9c"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <!-- locator halo -->
    <circle cx="32" cy="32" r="29" fill="#ffffff"/>
    <circle cx="32" cy="32" r="27" fill="#0f172a"/>
    <circle cx="32" cy="32" r="24" fill="#f8fafc"/>

    <!-- road / route slash -->
    <path d="M12 42 C22 32 30 35 39 25 C44 19 51 18 56 20" fill="none" stroke="#e11d48" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <path d="M10 46 C21 34 31 38 42 26 C48 20 53 20 58 22" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.95"/>

    <!-- truck body -->
    <g transform="translate(11 24)">
      <path d="M5 5.5c0-2.2 1.8-4 4-4h22c2.2 0 4 1.8 4 4V25H5V5.5Z" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M35 10h4.5c1 0 1.9.5 2.5 1.3l4.2 6c.5.7.8 1.6.8 2.5V25H35V10Z" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <path d="M38 13h2.1c.7 0 1.4.4 1.8 1l2.6 3.8H38V13Z" fill="#bfdbfe" stroke="#0f172a" stroke-width="1.4"/>
      <path d="M8 13h26" stroke="url(#blue)" stroke-width="5" stroke-linecap="round"/>
      <path d="M8 18h26" stroke="#e11d48" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M11 7.5h12" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
      <rect x="13" y="20" width="8" height="5" rx="1" fill="#f59e0b" stroke="#0f172a" stroke-width="1.2"/>
      <path d="M17 20v5" stroke="#0f172a" stroke-width="1" opacity="0.5"/>
      <circle cx="15" cy="26" r="4.6" fill="#0f172a"/>
      <circle cx="15" cy="26" r="2" fill="#e2e8f0"/>
      <circle cx="39" cy="26" r="4.6" fill="#0f172a"/>
      <circle cx="39" cy="26" r="2" fill="#e2e8f0"/>
    </g>
  </g>
</svg>
