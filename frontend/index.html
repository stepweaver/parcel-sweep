<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#004b87" />
    <meta name="author" content="Stephen Weaver" />
    <meta
      name="description"
      content="Parcel Sweep — last-mile delivery route optimization demo by Stephen Weaver (stepweaver.dev)."
    />
    <title>Parcel Sweep</title>
    <script>
      (function () {
        try {
          var key = "parcel-sweep-app-theme";
          var pref = localStorage.getItem(key);
          var dark =
            pref === "dark" ||
            (pref !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#0a0f14" : "#004b87");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
